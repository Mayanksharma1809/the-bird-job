<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: #f8fafc;
            color: #0f172a;
        }
        .card {
            background: #ffffff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            max-width: 420px;
            text-align: center;
        }
        a {
            display: inline-block;
            margin-top: 1rem;
            text-decoration: none;
            color: #ffffff;
            background: #2563eb;
            padding: 0.7rem 1rem;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>404</h1>
        <p>The page you requested could not be found.</p>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
