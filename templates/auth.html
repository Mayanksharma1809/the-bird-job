<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continue with {{ provider }} | The Bird Job</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans text-slate-600 bg-slate-50">
    <div class="min-h-screen flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10">
            <div class="text-center mb-8">
                <div class="mx-auto w-16 h-16 bg-gradient-to-br from-brand-500 to-accent-600 rounded-full flex items-center justify-center text-white mb-4">
                    <i class="fa-solid fa-dove text-2xl animate-pulse"></i>
                </div>
                <h1 class="text-2xl font-heading font-bold">Continue with {{ provider }}</h1>
                <p class="text-sm text-slate-600 mt-2">Tell us your email to proceed as a {{ role }}.</p>
            </div>

            <form method="POST" class="space-y-4">
                <input type="hidden" name="role" value="{{ role }}">

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Email</label>
                    <input name="email" type="email" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500" placeholder="you@example.com">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Full name</label>
                    <input name="name" type="text" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500" placeholder="Your name">
                </div>

                {% if provider.lower() == 'phone' %}
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Phone number</label>
                    <input name="phone" type="tel" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500" placeholder="+1 (555) 123-4567">
                </div>
                {% endif %}

                <button type="submit" class="w-full bg-gradient-to-r from-brand-600 to-accent-600 text-white py-3 rounded-xl font-bold hover:shadow-lg hover:shadow-brand-500/30 transition transform hover:-translate-y-0.5">
                    Continue
                </button>
            </form>

            <p class="text-center text-sm text-slate-500 mt-6">Already registered? <a href="/login" class="text-brand-600 font-medium hover:text-brand-700">Go to login</a></p>
        </div>
    </div>
</body>
</html>
